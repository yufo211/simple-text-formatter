name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    timeout-minutes: 3
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-core
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: pnpm setup
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  ci-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    timeout-minutes: 3
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-web
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: pnpm setup
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build